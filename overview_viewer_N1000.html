<!doctype html>
<meta charset="utf-8">
<title>TPPG11 overview N=1000</title>
<style>
  body { margin: 0; background: #0a0a0f; color: #e5e7eb; font-family: sans-serif; }
  #bar { position: sticky; top: 0; z-index: 2; display: flex; gap: 16px; align-items: center;
          padding: 10px 12px; background: #111827; border-bottom: 1px solid #334155; }
  #coord { min-width: 360px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  input { width: 72px; background: #020617; color: #e5e7eb; border: 1px solid #475569; padding: 4px; }
  button { background: #1d4ed8; color: white; border: 0; padding: 6px 10px; cursor: pointer; }
  #viewport { height: calc(100vh - 52px); overflow: auto; cursor: grab; }
  #viewport.dragging { cursor: grabbing; }
  #wrap { position: relative; width: 4000px; height: 4000px; }
  #grid { width: 4000px; height: 4000px; image-rendering: pixelated; display: block; user-select: none; }
  #marker { position: absolute; box-sizing: border-box; width: 4px; height: 4px;
             border: 1px solid #ffffff; outline: 1px solid #020617; pointer-events: none; display: none; }
  .guide { position: absolute; pointer-events: none; display: none; box-sizing: border-box; z-index: 1; }
  #rowGuide { left: 0; width: 4000px; border-top: 1px solid #ffffff; border-bottom: 1px solid #ffffff;
               background: transparent; }
  #colGuide { top: 0; height: 4000px; border-left: 1px solid #ffffff; border-right: 1px solid #ffffff;
               background: transparent; }
  #marker { z-index: 2; }
  .hint { color: #94a3b8; }
</style>
<div id="bar">
  <strong>TPPG11 overview N=1000</strong>
  <span id="coord">hover reports coordinates; typed selection stays fixed</span>
  <label>ID <input id="idInput" type="number" min="1" max="1000"></label>
  <button id="idBtn">select ID</button>
  <label>row <input id="rowInput" type="number" min="1" max="1000"></label>
  <label>col <input id="colInput" type="number" min="1" max="1000"></label>
  <button id="jumpBtn">select row/col</button>
  <button id="zoomOutBtn">-</button>
  <button id="zoomInBtn">+</button>
  <button id="zoomResetBtn">reset</button>
  <span id="zoomLabel" class="hint"></span>
  <span class="hint">wheel zooms at cursor; drag pans</span>
</div>
<div id="viewport">
  <div id="wrap">
    <img id="grid" src="overview_1px_per_cell_N1000.png" alt="TPPG11 compact overview">
    <div id="rowGuide" class="guide"></div>
    <div id="colGuide" class="guide"></div>
    <div id="marker"></div>
  </div>
</div>
<script>
const n = 1000;
const baseScale = 4;
const minScale = 1;
const maxScale = 64;
let scale = baseScale;
let selectedRow = null;
let selectedCol = null;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragStartScrollLeft = 0;
let dragStartScrollTop = 0;
const grid = document.getElementById("grid");
const viewport = document.getElementById("viewport");
const coord = document.getElementById("coord");
const marker = document.getElementById("marker");
const rowGuide = document.getElementById("rowGuide");
const colGuide = document.getElementById("colGuide");
const idInput = document.getElementById("idInput");
const rowInput = document.getElementById("rowInput");
const colInput = document.getElementById("colInput");
const zoomLabel = document.getElementById("zoomLabel");

grid.setAttribute("draggable", "false");

function clamp(value, low, high) {
  return Math.max(low, Math.min(high, value));
}

function updateDimensions() {
  const size = n * scale;
  const pixel = Math.max(1, scale);
  document.getElementById("wrap").style.width = size + "px";
  document.getElementById("wrap").style.height = size + "px";
  grid.style.width = size + "px";
  grid.style.height = size + "px";
  marker.style.width = pixel + "px";
  marker.style.height = pixel + "px";
  rowGuide.style.width = size + "px";
  colGuide.style.height = size + "px";
  zoomLabel.textContent = `zoom ${scale.toFixed(2)}x`;
  if (selectedRow !== null && selectedCol !== null) {
    positionSelection(selectedRow, selectedCol);
  }
}

function setScale(nextScale, anchorClientX, anchorClientY) {
  const oldScale = scale;
  const rect = viewport.getBoundingClientRect();
  const anchorX = anchorClientX === undefined ? rect.left + viewport.clientWidth / 2 : anchorClientX;
  const anchorY = anchorClientY === undefined ? rect.top + viewport.clientHeight / 2 : anchorClientY;
  const offsetX = anchorX - rect.left;
  const offsetY = anchorY - rect.top;
  const gridX = (viewport.scrollLeft + offsetX) / oldScale;
  const gridY = (viewport.scrollTop + offsetY) / oldScale;

  scale = clamp(nextScale, minScale, maxScale);
  updateDimensions();
  viewport.scrollLeft = Math.max(0, gridX * scale - offsetX);
  viewport.scrollTop = Math.max(0, gridY * scale - offsetY);
}

function cellFromEvent(event) {
  const rect = grid.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const col = Math.floor(x / rect.width * n) + 1;
  const row = Math.floor(y / rect.height * n) + 1;
  if (row < 1 || row > n || col < 1 || col > n) return null;
  return { row, col };
}

function setCoordinateText(row, col, prefix) {
  coord.textContent = `${prefix} row=${row}, column=${col}, coordinate=(${row},${col})`;
}

function positionSelection(row, col) {
  rowGuide.style.display = "block";
  rowGuide.style.top = ((row - 1) * scale) + "px";
  rowGuide.style.height = scale + "px";
  colGuide.style.display = "block";
  colGuide.style.left = ((col - 1) * scale) + "px";
  colGuide.style.width = scale + "px";
  marker.style.display = "block";
  marker.style.left = ((col - 1) * scale) + "px";
  marker.style.top = ((row - 1) * scale) + "px";
}

function selectCell(row, col, scrollToSelection) {
  selectedRow = row;
  selectedCol = col;
  idInput.value = row === col ? row : "";
  rowInput.value = row;
  colInput.value = col;
  positionSelection(row, col);
  setCoordinateText(row, col, "selected");
  if (scrollToSelection) {
    viewport.scrollTo({
      left: Math.max(0, (col - 1) * scale - viewport.clientWidth / 2),
      top: Math.max(0, (row - 1) * scale - viewport.clientHeight / 2),
      behavior: "smooth"
    });
  }
}

grid.addEventListener("mousemove", event => {
  const cell = cellFromEvent(event);
  if (!cell) return;
  setCoordinateText(cell.row, cell.col, "hover");
});

document.getElementById("jumpBtn").addEventListener("click", () => {
  const row = Math.max(1, Math.min(n, Number(rowInput.value || 1)));
  const col = Math.max(1, Math.min(n, Number(colInput.value || 1)));
  selectCell(row, col, true);
});

document.getElementById("idBtn").addEventListener("click", () => {
  const id = Math.max(1, Math.min(n, Number(idInput.value || 1)));
  selectCell(id, id, true);
});

rowInput.addEventListener("keydown", event => {
  if (event.key === "Enter") document.getElementById("jumpBtn").click();
});

colInput.addEventListener("keydown", event => {
  if (event.key === "Enter") document.getElementById("jumpBtn").click();
});

idInput.addEventListener("keydown", event => {
  if (event.key === "Enter") document.getElementById("idBtn").click();
});

document.getElementById("zoomInBtn").addEventListener("click", () => {
  setScale(scale * 1.5);
});

document.getElementById("zoomOutBtn").addEventListener("click", () => {
  setScale(scale / 1.5);
});

document.getElementById("zoomResetBtn").addEventListener("click", () => {
  setScale(baseScale);
});

viewport.addEventListener("wheel", event => {
  event.preventDefault();
  const factor = event.deltaY < 0 ? 1.25 : 0.8;
  setScale(scale * factor, event.clientX, event.clientY);
}, { passive: false });

viewport.addEventListener("pointerdown", event => {
  if (event.button !== 0) return;
  isDragging = true;
  dragStartX = event.clientX;
  dragStartY = event.clientY;
  dragStartScrollLeft = viewport.scrollLeft;
  dragStartScrollTop = viewport.scrollTop;
  viewport.classList.add("dragging");
  viewport.setPointerCapture(event.pointerId);
});

viewport.addEventListener("pointermove", event => {
  if (!isDragging) return;
  viewport.scrollLeft = dragStartScrollLeft - (event.clientX - dragStartX);
  viewport.scrollTop = dragStartScrollTop - (event.clientY - dragStartY);
});

viewport.addEventListener("pointerup", event => {
  isDragging = false;
  viewport.classList.remove("dragging");
  viewport.releasePointerCapture(event.pointerId);
});

viewport.addEventListener("pointercancel", () => {
  isDragging = false;
  viewport.classList.remove("dragging");
});

updateDimensions();
</script>
